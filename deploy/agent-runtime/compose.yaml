# agent-runtime: agent-server + PostgreSQL (PROJ-88).
# 自托管默认使用 Podman：`./deploy/agent-runtime/up.sh`
# 首次拉镜像慢：`./deploy/agent-runtime/up.sh --configure-mirrors`
#
# Env (host):
#   AGENT_RUNTIME_PORT=8787       agent-server HTTP
#   AGENT_RUNTIME_PG_PORT=5433    PostgreSQL（避免与本机 5432 冲突）
#   AGENT_RUNTIME_WORKSPACE=      挂载到容器 /workspace 的本机仓库路径（默认 ../../ 即 monorepo 根）
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/agent-runtime-postgres-entrypoint.sh"]
    command: ["postgres"]
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_runtime
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-entrypoint.sh:/usr/local/bin/agent-runtime-postgres-entrypoint.sh:ro
    ports:
      # 默认 5433，避免与本机 PostgreSQL（常见占用 5432）冲突
      - "${AGENT_RUNTIME_PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_runtime"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-server:
    build:
      context: ../..
      dockerfile: deploy/agent-runtime/Dockerfile
    ports:
      - "${AGENT_RUNTIME_PORT:-8787}:8787"
    environment:
      AGENT_RUNTIME_PORT: "8787"
      AGENT_RUNTIME_DATABASE_URL: "postgres://agent:agent@postgres:5432/agent_runtime"
      # Mobile 传入的本机 workspace 路径在容器内不可见；挂载后由此根目录扫描 pipeline。
      AGENT_RUNTIME_WORKSPACE_ROOT: /workspace
    volumes:
      - "${AGENT_RUNTIME_WORKSPACE:-../../}:/workspace:ro"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
