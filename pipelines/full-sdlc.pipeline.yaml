name: full-sdlc
description: Full software development lifecycle — domain analysis through testing and quality

stages:
  - name: domain
    skill: domain-analysis
    description: Domain boundary analysis and model definition

  - name: product-debate
    skill: product-debate
    description: Multi-persona product debate to explore options
    depends_on: [domain]

  - name: product
    skill: prd
    description: Product requirements document with quality scoring
    depends_on: [product-debate]

  - name: arch-debate
    skill: arch-debate
    description: Multi-persona architecture debate for technical decisions
    depends_on: [product]

  - name: tech-design
    skills:
      - rfc
      - adr
    description: Technical RFC and Architecture Decision Record (parallel)
    depends_on: [arch-debate]

  - name: test-planning
    skills:
      - priority-test-gate
      - api-test-gen
      - functional-e2e
    description: Test specification and generation (parallel)
    depends_on: [tech-design]

  - name: ui-testing
    skill: ui-test
    description: UI test specification and Playwright test generation
    depends_on: [product]

  - name: quality
    skills:
      - bug-tracker
      - test-report
    description: Bug tracking and test report analysis
    depends_on: [test-planning, ui-testing]
