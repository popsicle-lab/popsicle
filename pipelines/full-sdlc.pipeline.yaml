name: full-sdlc
description: Full software development lifecycle — product debate through implementation, testing, and quality
scale: full
keywords: [feature, user story, product, 功能, 需求, 新功能, cross-module, 跨模块]

stages:
  # --- Requirements & Design ---
  - name: product-debate
    skill: product-debate
    description: Multi-persona product debate to explore options

  - name: product
    skill: prd
    description: Product requirements document with quality scoring
    depends_on: [product-debate]

  - name: arch-debate
    skill: arch-debate
    description: Multi-persona architecture debate for technical decisions
    depends_on: [product]

  - name: tech-design
    skills:
      - rfc
      - adr
    description: Technical RFC and Architecture Decision Record (parallel)
    depends_on: [arch-debate]

  # --- Test Planning (before implementation) ---
  - name: test-planning
    skills:
      - priority-test-spec
      - api-test-spec
      - e2e-test-spec
    description: Test specification and priority classification (parallel)
    depends_on: [tech-design]

  - name: ui-test-planning
    skill: ui-test
    description: UI test specification driven by product requirements
    depends_on: [product]

  # --- Code Implementation ---
  - name: implementation
    skill: implementation
    description: Code implementation guided by design and test specifications
    depends_on: [tech-design, test-planning]

  # --- Test Code Generation (after implementation) ---
  - name: test-codegen
    skills:
      - unit-test-codegen
      - api-test-codegen
      - e2e-test-codegen
      - ui-test-codegen
    description: Generate and run test code against implementation (parallel)
    depends_on: [implementation, test-planning, ui-test-planning]

  # --- Quality ---
  - name: quality
    skills:
      - bug-tracker
      - test-report
    description: Bug tracking and test report analysis
    depends_on: [test-codegen]
