name: test-only
description: Testing pipeline — skip requirements, go straight to test generation

stages:
  - name: test-generation
    skills:
      - priority-test-gate
      - api-test-gen
      - ui-test
      - functional-e2e
    description: Generate all test types in parallel

  - name: quality
    skills:
      - bug-tracker
      - test-report
    description: Bug tracking and test report analysis
    depends_on: [test-generation]
