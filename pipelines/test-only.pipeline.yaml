name: test-only
description: Testing pipeline — skip requirements, generate test specs and code
scale: minimal
keywords: [test, coverage, 测试, 覆盖率, spec, 补充测试]

stages:
  - name: test-planning
    skills:
      - priority-test-spec
      - api-test-spec
      - ui-test
      - e2e-test-spec
    description: Generate all test specifications in parallel

  - name: test-codegen
    skills:
      - unit-test-codegen
      - api-test-codegen
      - ui-test-codegen
      - e2e-test-codegen
    description: Generate all test code in parallel
    depends_on: [test-planning]

  - name: quality
    skills:
      - bug-tracker
      - test-report
    description: Bug tracking and test report analysis
    depends_on: [test-codegen]
