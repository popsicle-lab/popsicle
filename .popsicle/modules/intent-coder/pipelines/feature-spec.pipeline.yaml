name: feature-spec
description: >-
  能力域 · 已有 product 上的增量 capability spec（无 legacy facts/debate 全链）。
  prd → intent-spec → intent-check。完成后用 feature-delivery 实现。
scale: full
keywords:
  - feature
  - capability
  - prd
  - intent
  - spec
  - incremental

stages:
  - name: prd
    skill: prd-writer
    description: >-
      为单个新能力产出 PDR + task + acceptance.intent 种子 + PRODUCT 增量。
      可跳过 product-debate（需求已在 issue 描述中收敛）。
    depends_on: []
    requires_approval: true

  - name: intent-spec
    skill: intent-spec-writer
    description: >-
      收紧 acceptance 种子为合法 intent-lang，合并到 products/<product>/intents/。
      须回填 contracts goal + realized_by（无 E_PRODUCT_MISSING_GOALS）。
    depends_on: [prd]

  - name: intent-check
    skill: intent-consistency-check
    description: >-
      Z3 一致性验证（observe）。合并 goal 追溯闸须 PASS。通过后解锁 feature-delivery。
    depends_on: [intent-spec]
