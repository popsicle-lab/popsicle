name: migration-slice-delivery
description: >-
  迁移域 · 单个 migration slice 的交付后半段：in-shadow 实现、legacy vs new golden
  对账、切流 ADR + traceability，最后保活实现态文档。
  前置：migration-slice-spec 的 intent-check 已通过。
scale: full
keywords:
  - migration
  - slice
  - implementation
  - equivalence
  - golden
  - cutover
  - strangler-fig
  - shadow

stages:
  - name: implement
    skill: shadow-implementer
    description: >-
      读 products/<slice>/intents/* + ADR § File Manifest + 已有 crates/<slice>/，
      实现/补齐 in-shadow 代码与 intent_properties 覆盖表。可多轮迭代。
    depends_on: []

  - name: equivalence
    skill: equivalence-baseline
    description: >-
      从 LEGACY_PIN + api-contracts 生成/运行 golden 脚本，产出
      docs/baseline/<date>/ 与 migration/traceability.md 行；登记已知 divergence。
    depends_on: [implement]
    gate:
      # 机验轴（P4/H6）：realized_by 目标追溯必须可解析，auto 也不可绕。
      - ref_resolvable: {product_intents: true, fields: [realized_by]}

  - name: cutover
    skill: cutover-author
    description: >-
      门禁：intent gate_ready≥3、≥5 golden pass（或 ADR 登记 divergence）、
      cargo test 全绿。产出切流 ADR(Accepted)、更新 migration/progress.md。
    depends_on: [equivalence]
    requires_approval: true          # 人验轴：approval_mode 控制是否需 --confirm
    gate:                            # 机验轴（#18/#19/P3）：引擎实跑，任何 approval_mode 都执行
      - command_exit_zero: "cargo test"
      - assert: {file: "docs/baseline/**/baseline.yaml", field: summary.golden_pass, op: ">=", value: 5}
      - manifest_recomputes: {file: "docs/baseline/**/baseline.yaml", field: summary.golden_pass, equals_count_of: goldens, where: "status=pass"}
      - assert: {file: "docs/baseline/**/baseline.yaml", field: summary.equivalence_gate_pass, op: "==", value: true}
      - assert: {file: "docs/baseline/**/baseline.yaml", field: legacy_pin, op: "!=", value: "REPLACE_WITH_REAL_LEGACY_PIN"}
      - ref_resolvable: {product_intents: true, fields: [realized_by]}

  - name: living-docs
    skill: living-doc-author
    description: >-
      刷新 implementation-status / architecture-manifest / product-header。
      建议 --target implementation-status,architecture-manifest,product-header。
      **不含** tasks-index / product-context（见 doc-sync-weekly pipeline）。
    depends_on: [cutover]
    requires_approval: true
