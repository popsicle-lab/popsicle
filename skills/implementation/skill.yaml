name: implementation
description: Code implementation tracking and task management
version: "0.1.0"

inputs:
  - from_skill: tech-rfc
    artifact_type: rfc
    required: true
  - from_skill: test-spec
    artifact_type: test-spec
    required: true

artifacts:
  - type: impl-plan
    template: templates/impl-plan.md
    file_pattern: "{slug}.impl-plan.md"

workflow:
  initial: planning
  states:
    planning:
      transitions:
        - to: in_progress
          action: start
    in_progress:
      transitions:
        - to: code_review
          action: submit
        - to: planning
          action: replan
    code_review:
      transitions:
        - to: done
          action: merge
        - to: in_progress
          action: revise
    done:
      final: true

prompts:
  planning: |
    Based on the RFC and test spec, create an implementation plan:
    1. Break down into implementable tasks
    2. Define task dependencies and order
    3. Estimate complexity for each task
    4. Identify risks and mitigation strategies
  in_progress: |
    Implement the next task according to the implementation plan.
    Ensure code follows the architectural decisions from the ADR.
    Write tests according to the test specification.
