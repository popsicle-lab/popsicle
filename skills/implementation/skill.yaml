name: implementation
description: Code implementation guided by RFC, ADR, and test specifications
version: "0.1.0"

inputs:
  - from_skill: rfc
    artifact_type: rfc
    required: true
  - from_skill: adr
    artifact_type: adr
    required: true
  - from_skill: priority-test-spec
    artifact_type: test-gate-report
    required: false
    relevance: medium
    sections:
      - Feature Classification
      - Coverage by Dimension
  - from_skill: api-test-spec
    artifact_type: api-test-spec
    required: false
    relevance: low
  - from_skill: e2e-test-spec
    artifact_type: e2e-test-spec
    required: false
    relevance: low

artifacts:
  - type: impl-record
    template: templates/impl-record.md
    file_pattern: "{slug}.impl-record.md"

workflow:
  initial: planning
  states:
    planning:
      transitions:
        - to: coding
          action: start
          guard: "upstream_approved"
    coding:
      transitions:
        - to: review
          action: submit
          guard: "has_sections:Change Summary,Files Changed;checklist_complete:Verification Checklist"
    review:
      transitions:
        - to: completed
          action: approve
          requires_approval: true
        - to: coding
          action: revise
    completed:
      final: true

prompts:
  planning: |
    Create an implementation plan. Review the RFC and ADR for design decisions.
    If this pipeline skips design phases, gather architecture context from the user.
    Break down into components, define implementation order, and identify key interfaces.
    Full context: popsicle prompt implementation --state planning --run {run_id}
  coding: |
    Implement components per the plan. Follow project coding conventions from
    project context. After each significant change, update the impl-record with
    files changed and verification checklist.
    Link commits: popsicle git link --doc <doc-id> --stage implementation

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
