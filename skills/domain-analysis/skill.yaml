name: domain-analysis
description: Domain boundary analysis and model definition
version: "0.1.0"

inputs: []

artifacts:
  - type: domain-model
    template: templates/domain-model.md
    file_pattern: "{slug}.domain-model.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: review
          action: submit
    review:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Bounded Contexts,Entity Relationships"
          requires_approval: true
        - to: draft
          action: revise
    approved:
      final: true

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
