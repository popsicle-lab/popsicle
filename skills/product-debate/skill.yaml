name: product-debate
description: Multi-persona product debate simulator for exploring options before PRD
version: "0.1.0"

inputs:
  - from_skill: domain-analysis
    artifact_type: domain-model
    required: false
    relevance: low

artifacts:
  - type: product-debate-record
    template: templates/debate-record.md
    file_pattern: "{slug}.product-debate.md"

workflow:
  initial: setup
  states:
    setup:
      transitions:
        - to: debating
          action: start
    debating:
      transitions:
        - to: concluded
          action: conclude
          requires_approval: true
        - to: setup
          action: restart
    concluded:
      final: true

prompts:
  setup: |
    Set up a product debate. Load domain context if available, identify 4-6 expert
    roles, and define the debate topic. Pause for user confirmation before starting.
    Full context: popsicle prompt product-debate --state setup --run {run_id}
  debating: |
    Facilitate multi-role product debate. Each phase: roles state positions, then
    pause for user input. Cover feasibility, market fit, risk, and prioritization.
    Full context: popsicle prompt product-debate --state debating --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
