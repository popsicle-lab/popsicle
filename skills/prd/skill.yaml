name: prd
description: Interactive PRD generation with quality scoring and iterative refinement
version: "0.1.0"

inputs:
  - from_skill: product-debate
    artifact_type: product-debate-record
    required: false
  - from_skill: domain-analysis
    artifact_type: domain-model
    required: false
    relevance: low

artifacts:
  - type: prd
    template: templates/prd.md
    file_pattern: "{slug}.prd.md"

workflow:
  initial: gathering
  states:
    gathering:
      transitions:
        - to: scoring
          action: assess
    scoring:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Executive Summary,Problem Statement,User Stories & Acceptance Criteria"
          requires_approval: true
        - to: gathering
          action: refine
    approved:
      final: true

prompts:
  gathering: |
    Gather product requirements through user interview. Build the PRD iteratively:
    Executive Summary, Problem Statement, Success Metrics, User Personas,
    User Stories with Acceptance Criteria. Ask clarifying questions.
    Full context: popsicle prompt prd --state gathering --run {run_id}
  scoring: |
    Assess PRD quality. Score completeness, clarity, and testability.
    Target 90+ quality score. Identify gaps and suggest refinements.
    Full context: popsicle prompt prd --state scoring --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract user-stories --from-doc $POPSICLE_DOC_ID"
