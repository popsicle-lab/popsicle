name: e2e-test-codegen
description: Generate end-to-end test code from approved E2E test specifications
version: "0.1.0"

inputs:
  - from_skill: e2e-test-spec
    artifact_type: e2e-test-spec
    required: true
  - from_skill: implementation
    artifact_type: impl-record
    required: false
    relevance: medium
    sections:
      - Change Summary
      - Files Changed

artifacts:
  - type: e2e-test-report
    template: templates/e2e-test-report.md
    file_pattern: "{slug}.e2e-test-report.md"

workflow:
  initial: generating
  states:
    generating:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: completed
          action: approve
          guard: "has_sections:Generated Tests,Coverage Summary;checklist_complete:Generation Checklist"
          requires_approval: true
        - to: generating
          action: revise
    completed:
      final: true

prompts:
  generating: |
    Generate E2E test code from the approved E2E test spec. If test-spec is not
    available, analyze user-facing flows in the codebase and generate tests for
    critical end-to-end scenarios.
    Full context: popsicle prompt e2e-test-codegen --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
