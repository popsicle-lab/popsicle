name: ui-test
description: Spec-driven Playwright UI test specification
version: "0.2.0"

inputs:
  - from_skill: prd
    artifact_type: prd
    required: true

artifacts:
  - type: ui-test-spec
    template: templates/ui-test-spec.md
    file_pattern: "{slug}.ui-test-spec.md"

workflow:
  initial: proposal
  states:
    proposal:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Coverage Plan,Test Scenarios"
          requires_approval: true
        - to: proposal
          action: revise
    approved:
      final: true

prompts:
  proposal: |
    Propose a UI test plan using Playwright. Analyze PRD for UI requirements.
    If PRD is not available, analyze the codebase for UI components and user flows.
    Define Coverage Plan and Test Scenarios with Page Object patterns.
    Full context: popsicle prompt ui-test --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract test-cases --from-doc $POPSICLE_DOC_ID --type ui"
