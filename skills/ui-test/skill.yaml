name: ui-test
description: Spec-driven Playwright UI test generation
version: "0.1.0"

inputs:
  - from_skill: prd
    artifact_type: prd
    required: true

artifacts:
  - type: ui-test-spec
    template: templates/ui-test-spec.md
    file_pattern: "{slug}.ui-test-spec.md"

workflow:
  initial: proposal
  states:
    proposal:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: generating
          action: approve
        - to: proposal
          action: revise
    generating:
      transitions:
        - to: completed
          action: complete
    completed:
      final: true

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
