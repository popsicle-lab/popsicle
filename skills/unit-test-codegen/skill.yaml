name: unit-test-codegen
description: Generate unit test code based on priority test gate report and implementation
version: "0.1.0"

inputs:
  - from_skill: priority-test-spec
    artifact_type: test-gate-report
    required: true
  - from_skill: implementation
    artifact_type: impl-record
    required: false
    relevance: medium
    sections:
      - Change Summary
      - Files Changed

artifacts:
  - type: unit-test-report
    template: templates/unit-test-report.md
    file_pattern: "{slug}.unit-test-report.md"

workflow:
  initial: generating
  states:
    generating:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: completed
          action: approve
          guard: "has_sections:Generated Tests,Coverage Summary;checklist_complete:Generation Checklist"
          requires_approval: true
        - to: generating
          action: revise
    completed:
      final: true

prompts:
  generating: |
    Generate unit test code from the priority test gate report. Focus on P0 tests
    first, then P1. If test-spec is not available, analyze the implementation
    directly and generate tests for critical code paths.
    Full context: popsicle prompt unit-test-codegen --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
