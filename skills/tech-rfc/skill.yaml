name: tech-rfc
description: Technical RFC (Request for Comments) for design decisions
version: "0.1.0"

inputs:
  - from_skill: product-prd
    artifact_type: prd
    required: true

artifacts:
  - type: rfc
    template: templates/rfc.md
    file_pattern: "{slug}.rfc.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: review
          action: submit
    review:
      transitions:
        - to: accepted
          action: accept
        - to: draft
          action: revise
        - to: rejected
          action: reject
    accepted:
      final: true
    rejected:
      final: true

prompts:
  draft: |
    Based on the PRD provided, write a Technical RFC that covers:
    1. Problem statement and context
    2. Proposed solution with detailed technical design
    3. API design (if applicable)
    4. Data model changes
    5. Alternatives considered
    6. Migration strategy (if applicable)
    Follow the template structure provided.
  review: |
    Review this RFC for technical soundness:
    - Is the proposed solution feasible?
    - Are there scalability concerns?
    - Are alternatives fairly evaluated?
    - Is the API design clean and consistent?
