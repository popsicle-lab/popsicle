name: adr
description: Architecture Decision Record creation and management
version: "0.1.0"

inputs:
  - from_skill: arch-debate
    artifact_type: arch-debate-record
    required: false
  - from_skill: prd
    artifact_type: prd
    required: true
    relevance: medium
    sections:
      - Problem Statement
      - Technical Constraints

artifacts:
  - type: adr
    template: templates/adr.md
    file_pattern: "{slug}.adr.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: proposed
          action: submit
          guard: "upstream_approved"
    proposed:
      transitions:
        - to: accepted
          action: accept
          guard: "has_sections:Context,Decision,Consequences"
          requires_approval: true
        - to: draft
          action: revise
        - to: superseded
          action: supersede
    accepted:
      final: true
    superseded:
      final: true

prompts:
  draft: |
    Write an Architecture Decision Record. Capture the Context, Decision, and
    Consequences. Reference the arch-debate outcome if available, or gather
    the decision context from the user directly.
    Full context: popsicle prompt adr --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
