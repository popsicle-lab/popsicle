name: bug-tracker
description: Test-driven bug tracking with dedup, recording, and reporting
version: "0.1.0"

inputs:
  - from_skill: unit-test-codegen
    artifact_type: unit-test-report
    required: false
  - from_skill: api-test-codegen
    artifact_type: api-test-report
    required: false
  - from_skill: ui-test-codegen
    artifact_type: ui-test-report
    required: false
  - from_skill: e2e-test-codegen
    artifact_type: e2e-test-report
    required: false

artifacts:
  - type: bug-report
    template: templates/bug-report.md
    file_pattern: "{slug}.bug-report.md"

workflow:
  initial: collecting
  states:
    collecting:
      transitions:
        - to: triaged
          action: triage
    triaged:
      transitions:
        - to: closed
          action: close
        - to: collecting
          action: reopen
    closed:
      final: true

prompts:
  collecting: |
    Collect bugs from test execution results. For each failure: dedup against
    existing bugs, record or reuse, then continue. Never interrupt the test flow
    for a single bug. Use: popsicle bug record --from-test --error "<msg>"
    Full context: popsicle prompt bug-tracker --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract bugs --from-doc $POPSICLE_DOC_ID"
