name: priority-test-spec
description: Auto-discover features and classify P0/P1/P2 test priorities
version: "0.2.0"

inputs:
  - from_skill: adr
    artifact_type: adr
    required: true

artifacts:
  - type: test-gate-report
    template: templates/test-gate-report.md
    file_pattern: "{slug}.test-gate.md"

workflow:
  initial: discovery
  states:
    discovery:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Feature Classification,Coverage by Dimension"
          requires_approval: true
        - to: discovery
          action: revise
    approved:
      final: true

prompts:
  discovery: |
    Discover features and classify test priorities (P0/P1/P2). Analyze the ADR
    and codebase to identify critical paths. If ADR is not available, analyze the
    codebase directly. Apply three dimensions: Happy path, Boundary, Error.
    Full context: popsicle prompt priority-test-spec --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract test-cases --from-doc $POPSICLE_DOC_ID --type unit"
