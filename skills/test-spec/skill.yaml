name: test-spec
description: Test specification and test code generation planning
version: "0.1.0"

inputs:
  - from_skill: tech-rfc
    artifact_type: rfc
    required: true
  - from_skill: tech-adr
    artifact_type: adr
    required: false

artifacts:
  - type: test-spec
    template: templates/test-spec.md
    file_pattern: "{slug}.test-spec.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: review
          action: submit
    review:
      transitions:
        - to: approved
          action: approve
        - to: draft
          action: revise
    approved:
      final: true

prompts:
  draft: |
    Based on the RFC and ADR provided, create a comprehensive test specification:
    1. Unit test plan with test cases for each module
    2. Integration test scenarios
    3. Edge cases and error handling tests
    4. Performance test criteria (if applicable)
    Follow the template structure provided.
  review: |
    Review this test specification:
    - Are all critical paths covered?
    - Are edge cases identified?
    - Are test assertions specific and measurable?
    - Is test coverage sufficient?
