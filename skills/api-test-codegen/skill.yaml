name: api-test-codegen
description: Generate API integration test code from approved test specifications
version: "0.1.0"

inputs:
  - from_skill: api-test-spec
    artifact_type: api-test-spec
    required: true
  - from_skill: implementation
    artifact_type: impl-record
    required: false
    relevance: medium
    sections:
      - Change Summary
      - Files Changed

artifacts:
  - type: api-test-report
    template: templates/api-test-report.md
    file_pattern: "{slug}.api-test-report.md"

workflow:
  initial: generating
  states:
    generating:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: completed
          action: approve
          guard: "has_sections:Generated Tests,Coverage Summary;checklist_complete:Generation Checklist"
          requires_approval: true
        - to: generating
          action: revise
    completed:
      final: true

prompts:
  generating: |
    Generate API integration test code from the approved API test spec. If
    test-spec is not available, discover API endpoints from the codebase and
    generate tests for critical integrations.
    Full context: popsicle prompt api-test-codegen --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
