name: product-prd
description: Product requirements document (PRD) creation and management
version: "0.1.0"

inputs:
  - from_skill: domain-analysis
    artifact_type: domain-model
    required: true

artifacts:
  - type: prd
    template: templates/prd.md
    file_pattern: "{slug}.prd.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: discussion
          action: submit
    discussion:
      transitions:
        - to: approved
          action: approve
        - to: draft
          action: revise
    approved:
      final: true

prompts:
  draft: |
    Based on the domain model provided, write a Product Requirements Document (PRD).
    Include: background, goals, non-goals, user stories, acceptance criteria.
    Follow the template structure provided.
  discussion: |
    Review this PRD for completeness:
    - Are all user stories covered?
    - Are acceptance criteria measurable?
    - Are non-goals clearly stated?
    - Any edge cases missing?
