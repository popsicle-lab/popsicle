name: e2e-test-spec
description: Functional end-to-end test spec generation with six-perspective analysis
version: "0.1.0"

inputs:
  - from_skill: prd
    artifact_type: prd
    required: true
  - from_skill: adr
    artifact_type: adr
    required: false
    relevance: medium
    sections:
      - Context
      - Decision

artifacts:
  - type: e2e-test-spec
    template: templates/e2e-test-spec.md
    file_pattern: "{slug}.e2e-spec.md"

workflow:
  initial: analysis
  states:
    analysis:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: approved
          action: approve
          requires_approval: true
        - to: analysis
          action: revise
    approved:
      final: true

prompts:
  analysis: |
    Analyze user scenarios for E2E test coverage. Use six perspectives: POS, BND,
    CHN, INV, LFC, DPL. Reference PRD for user stories if available, or analyze
    the codebase directly for user-facing flows.
    Full context: popsicle prompt e2e-test-spec --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract test-cases --from-doc $POPSICLE_DOC_ID --type e2e"
