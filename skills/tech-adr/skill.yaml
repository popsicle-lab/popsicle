name: tech-adr
description: Architecture Decision Record (ADR) for documenting key decisions
version: "0.1.0"

inputs:
  - from_skill: product-prd
    artifact_type: prd
    required: true

artifacts:
  - type: adr
    template: templates/adr.md
    file_pattern: "{slug}.adr.md"

workflow:
  initial: draft
  states:
    draft:
      transitions:
        - to: proposed
          action: submit
    proposed:
      transitions:
        - to: accepted
          action: accept
        - to: superseded
          action: supersede
        - to: draft
          action: revise
    accepted:
      final: true
    superseded:
      final: true

prompts:
  draft: |
    Document an Architecture Decision Record (ADR) covering:
    1. The decision context and forces at play
    2. The decision made and its rationale
    3. Consequences (positive, negative, neutral)
    Follow the template structure provided.
  proposed: |
    Review this ADR:
    - Is the context well described?
    - Are all considered options listed?
    - Is the rationale for the chosen option clear?
    - Are consequences realistic?
