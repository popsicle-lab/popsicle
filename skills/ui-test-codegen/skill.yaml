name: ui-test-codegen
description: Generate Playwright UI test code from approved UI test specifications
version: "0.1.0"

inputs:
  - from_skill: ui-test
    artifact_type: ui-test-spec
    required: true
  - from_skill: implementation
    artifact_type: impl-record
    required: false
    relevance: medium
    sections:
      - Change Summary
      - Files Changed

artifacts:
  - type: ui-test-report
    template: templates/ui-test-report.md
    file_pattern: "{slug}.ui-test-report.md"

workflow:
  initial: generating
  states:
    generating:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: completed
          action: approve
          guard: "has_sections:Generated Tests,Coverage Summary;checklist_complete:Generation Checklist"
          requires_approval: true
        - to: generating
          action: revise
    completed:
      final: true

prompts:
  generating: |
    Generate Playwright UI test code from the approved UI test spec. If test-spec
    is not available, analyze UI components in the codebase and generate tests
    for critical user interactions using Page Object patterns.
    Full context: popsicle prompt ui-test-codegen --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
