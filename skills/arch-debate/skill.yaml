name: arch-debate
description: Multi-persona architecture debate simulator for technical decisions
version: "0.1.0"

inputs:
  - from_skill: prd
    artifact_type: prd
    required: true

artifacts:
  - type: arch-debate-record
    template: templates/debate-record.md
    file_pattern: "{slug}.arch-debate.md"

workflow:
  initial: setup
  states:
    setup:
      transitions:
        - to: debating
          action: start
          guard: "upstream_approved"
    debating:
      transitions:
        - to: concluded
          action: conclude
          requires_approval: true
        - to: setup
          action: restart
    concluded:
      final: true

prompts:
  setup: |
    Prepare an architecture debate. Review the PRD (or gather requirements directly
    if the pipeline skips PRD). Identify 4-6 expert roles relevant to the technical
    domain. Define the debate topic and constraints.
    Full context: popsicle prompt arch-debate --state setup --run {run_id}
  debating: |
    Facilitate multi-role architecture debate. Roles propose solutions, challenge
    assumptions, and evaluate trade-offs. Produce a decision matrix. Pause after
    each phase for user input.
    Full context: popsicle prompt arch-debate --state debating --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
