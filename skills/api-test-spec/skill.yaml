name: api-test-spec
description: Spec-driven API integration test specification (gRPC/HTTP)
version: "0.2.0"

inputs:
  - from_skill: adr
    artifact_type: adr
    required: true

artifacts:
  - type: api-test-spec
    template: templates/api-test-spec.md
    file_pattern: "{slug}.api-test-spec.md"

workflow:
  initial: spec-gen
  states:
    spec-gen:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Coverage Matrix,Test Cases"
          requires_approval: true
        - to: spec-gen
          action: revise
    approved:
      final: true

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
