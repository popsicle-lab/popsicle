name: api-test-spec
description: Spec-driven API integration test specification (gRPC/HTTP)
version: "0.2.0"

inputs:
  - from_skill: adr
    artifact_type: adr
    required: true

artifacts:
  - type: api-test-spec
    template: templates/api-test-spec.md
    file_pattern: "{slug}.api-test-spec.md"

workflow:
  initial: spec-gen
  states:
    spec-gen:
      transitions:
        - to: review
          action: submit
          guard: "upstream_approved"
    review:
      transitions:
        - to: approved
          action: approve
          guard: "has_sections:Coverage Matrix,Test Cases"
          requires_approval: true
        - to: spec-gen
          action: revise
    approved:
      final: true

prompts:
  spec-gen: |
    Generate API integration test specifications. Analyze ADR and codebase for
    API endpoints. If ADR is not available, discover APIs from the codebase directly.
    Stage 1: generate spec (block for review). Stage 2: generate test code.
    Full context: popsicle prompt api-test-spec --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: "popsicle extract test-cases --from-doc $POPSICLE_DOC_ID --type api"
