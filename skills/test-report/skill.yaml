name: test-report
description: Test report parsing, bug registration, and coverage tracking
version: "0.1.0"

inputs:
  - from_skill: bug-tracker
    artifact_type: bug-report
    required: false
  - from_skill: unit-test-codegen
    artifact_type: unit-test-report
    required: false
    relevance: medium
    sections:
      - Test Scope
      - Coverage Summary
      - Issues Found
  - from_skill: api-test-codegen
    artifact_type: api-test-report
    required: false
    relevance: medium
    sections:
      - Test Scope
      - Coverage Summary
      - Issues Found
  - from_skill: ui-test-codegen
    artifact_type: ui-test-report
    required: false
    relevance: medium
    sections:
      - Test Scope
      - Coverage Summary
      - Issues Found
  - from_skill: e2e-test-codegen
    artifact_type: e2e-test-report
    required: false
    relevance: medium
    sections:
      - Test Scope
      - Coverage Summary
      - Issues Found

artifacts:
  - type: test-summary
    template: templates/test-summary.md
    file_pattern: "{slug}.test-summary.md"

workflow:
  initial: collecting
  states:
    collecting:
      transitions:
        - to: analyzed
          action: analyze
    analyzed:
      transitions:
        - to: finalized
          action: finalize
        - to: collecting
          action: recollect
    finalized:
      final: true

prompts:
  collecting: |
    Collect test reports from all test stages. Parse results from pytest, cargo
    test, or playwright output. Every FAIL must register a bug; every XPASS must
    be flagged for review. Aggregate into a coverage summary.
    Full context: popsicle prompt test-report --run {run_id}

hooks:
  on_enter: null
  on_artifact_created: null
  on_complete: null
