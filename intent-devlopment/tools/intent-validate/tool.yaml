name: intent-validate
description: >
  对 .intent 文件跑 intent-lang 的一致性验证（parse + typecheck + VC 生成 + Z3）。
  是 intent-consistency-check skill 的底层执行器。输出 intent-lang 的原生结果
  （text 或 json）；exit 0 = 全部 verified/skipped，exit 1 = 解析/类型错误或任一 VC 失败。
version: "0.1.0"

args:
  - name: path
    description: 要验证的 .intent 文件路径（相对仓库根或绝对路径）
    required: true
  - name: format
    description: 输出格式，text 给人读 / json 给 skill 解析
    required: false
    default: json
  - name: include_asis
    description: 是否一并验证 @asis（遗留）意图；默认只验证 @tobe / 无标注
    required: false
    default: ""

# popsicle tool run 在 tool.source_dir 下以 sh -c 执行渲染后的命令。
# 这里先在 PATH 上找 `intent`；找不到则回退到仓库内已编译的 intent-cli。
# 这样无论是否全局安装 intent-lang，本 tool 都能跑。
command: |
  set -e
  ROOT="$(git rev-parse --show-toplevel)"
  INTENT_BIN="$(command -v intent || true)"
  if [ -z "$INTENT_BIN" ]; then
    INTENT_BIN="$ROOT/intent-lang/target/release/intent-cli"
  fi
  if [ ! -x "$INTENT_BIN" ]; then
    echo "error: intent-lang 未找到。请把 intent 装进 PATH，或在 intent-lang/ 下跑 'cargo build --release -p intent-cli'。" >&2
    exit 127
  fi
  if ! command -v z3 >/dev/null 2>&1; then
    echo "error: 未找到 z3。intent-lang 依赖系统 PATH 上的 z3 求解器。" >&2
    exit 127
  fi
  case "{{path}}" in
    /*) TARGET="{{path}}" ;;
    *)  TARGET="$ROOT/{{path}}" ;;
  esac
  "$INTENT_BIN" --format "{{format}}" check "$TARGET" {{include_asis}}
