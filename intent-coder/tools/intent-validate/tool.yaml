name: intent-validate
description: >
  对 .intent 文件跑 intent-lang 的一致性验证（parse + typecheck + VC 生成 + Z3）。
  是 intent-consistency-check skill 的底层执行器。输出 intent-lang 的原生结果
  （text 或 json）；exit 0 = 全部 verified/skipped，exit 1 = 解析/类型错误或任一 VC 失败。
version: "0.2.0"

args:
  - name: path
    description: 要验证的 .intent 文件或目录路径（相对仓库根或绝对路径；目录会递归枚举 *.intent）
    required: true
  - name: format
    description: 输出格式，text 给人读 / json 给 skill 解析
    required: false
    default: json
  - name: include_asis
    description: 是否一并验证 @asis（遗留）意图；默认只验证 @tobe / 无标注
    required: false
    default: ""

# popsicle tool run 在 tool.source_dir 下以 sh -c 执行渲染后的命令。
# 这里先在 PATH 上找 `intent`；找不到则回退到仓库内已编译的 intent-cli。
# 这样无论是否全局安装 intent-lang，本 tool 都能跑。
command: |
  set -e
  ROOT="$(git rev-parse --show-toplevel)"
  INTENT_BIN="$(command -v intent || true)"
  if [ -z "$INTENT_BIN" ]; then
    for CANDIDATE in \
      "$ROOT/intent-lang/target/release/intent-cli" \
      "$ROOT/vender/intent-lang/target/release/intent-cli" \
      "$ROOT/legacy/popsicle/vender/intent-lang/target/release/intent-cli" \
      "$ROOT/../vender/intent-lang/target/release/intent-cli"
    do
      if [ -x "$CANDIDATE" ]; then
        INTENT_BIN="$CANDIDATE"
        break
      fi
    done
  fi
  if [ ! -x "$INTENT_BIN" ]; then
    echo "error: intent-lang 未找到。请把 intent 装进 PATH，或在 intent-lang/ 下跑 'cargo build --release -p intent-cli'。" >&2
    exit 127
  fi
  if ! command -v z3 >/dev/null 2>&1; then
    echo "error: 未找到 z3。intent-lang 依赖系统 PATH 上的 z3 求解器。" >&2
    exit 127
  fi
  case "{{path}}" in
    /*) TARGET="{{path}}" ;;
    *)  TARGET="$ROOT/{{path}}" ;;
  esac
  run_one() {
    "$INTENT_BIN" --format "{{format}}" check "$1" {{include_asis}}
  }

  if [ -d "$TARGET" ]; then
    STATUS=0
    FOUND=0
    FOUND_FILE="$ROOT/.popsicle/tmp-intent-validate-found-$$"
    STATUS_FILE="$ROOT/.popsicle/tmp-intent-validate-status-$$"
    trap 'rm -f "$FOUND_FILE" "$STATUS_FILE"' EXIT
    find "$TARGET" -type f -name '*.intent' | sort | while IFS= read -r FILE; do
      FOUND=1
      run_one "$FILE" || STATUS=1
      printf '%s\n' "$FOUND" > "$FOUND_FILE"
      printf '%s\n' "$STATUS" > "$STATUS_FILE"
    done
    if [ -f "$FOUND_FILE" ]; then
      FOUND="$(cat "$FOUND_FILE")"
    fi
    if [ -f "$STATUS_FILE" ]; then
      STATUS="$(cat "$STATUS_FILE")"
    fi
    if [ "$FOUND" -eq 0 ]; then
      echo "error: no .intent files found under $TARGET" >&2
      exit 1
    fi
    exit "$STATUS"
  fi

  run_one "$TARGET"
