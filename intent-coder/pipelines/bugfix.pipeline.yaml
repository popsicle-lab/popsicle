name: bugfix
description: >-
  Minimal bug-fix loop: reproduce and fix with regression tests, then verify
  against golden/regression baselines. Default pipeline for `--type bug`.
scale: minimal
keywords:
  - bug
  - fix
  - regression
  - hotfix

stages:
  - name: implement
    skill: shadow-implementer
    description: >-
      Reproduce the bug, implement the fix, and add a regression test that
      fails before the fix and passes after.
    depends_on: []
    requires_approval: false

  - name: verify
    skill: equivalence-baseline
    description: >-
      Run the relevant golden/regression baselines and record the verification
      evidence (what was run, what passed).
    depends_on: [implement]
    requires_approval: false
