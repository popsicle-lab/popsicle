name: slice-spec
description: >-
  单个迁移 slice 的 spec 链（无 project-init、无末尾 living-docs）。仓库已由
  migration-bootstrap 铺好后，每个新 slice 跑此 pipeline，避免重复 10 stage 全价。
  技术侧支线（arch-debate→rfc→adr）在 PRD 无跨模块契约时可整段 skip。
  spec 完成后接 slice-delivery 做实现/对账/切流。
scale: full
keywords:
  - migration
  - slice
  - prd
  - intent
  - spec
  - legacy

stages:
  - name: facts
    skill: fact-extractor
    description: >-
      在 pinned legacy submodule 上按 slice 范围抽事实（优先
      products/<slice>/ 对应 legacy 子路径）。产出 fact-extraction-report
      作为下游 writer 的事实基。
    depends_on: []

  - name: debate
    skill: product-debate
    description: >-
      多角色产品辩论。routine slice 可快速过；边界/裁剪有争议时充分辩论。
      产出 prd-draft + 辩论纪要 + 决策矩阵。
    depends_on: [facts]
    requires_approval: true

  - name: prd
    skill: prd-writer
    description: >-
      任务图五件套：PRD overview + N 份 task + tasks/README + acceptance.intent
      种子 + PDR 骨架。质量评分 ≥ 90 才放行。
    depends_on: [debate]
    requires_approval: true

  - name: arch-debate
    skill: arch-debate
    description: >-
      技术侧支线起点。PRD 无 contracts / [ADR 候选] 时可 skip（及 rfc、adr）。
    depends_on: [prd]
    requires_approval: true

  - name: rfc
    skill: rfc-writer
    description: >-
      RFC + ARCHITECTURE.md 增量 + contracts.intent 种子 + ADR 骨架（Proposed）。
    depends_on: [arch-debate]
    requires_approval: true

  - name: adr
    skill: adr-writer
    description: >-
      固化 ADR(Accepted)，解锁 contracts 种子，列收紧工单交 intent-spec-writer。
    depends_on: [rfc]
    requires_approval: true

  - name: intent-spec
    skill: intent-spec-writer
    description: >-
      把 acceptance 种子 + 解锁的 contracts 收紧成合法 intent-lang，合并到
      products/<slice>/intents/*.intent。
    depends_on: [prd, adr]

  - name: intent-check
    skill: intent-consistency-check
    description: >-
      对全量/增量 .intent 跑 Z3 一致性验证（observe）。通过后解锁 slice-delivery。
    depends_on: [intent-spec]
