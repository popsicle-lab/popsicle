name: rfc-writer
description: 把 arch-debate 的 rfc-draft 打磨成可落地的技术设计三件套——正式 RFC（含 ARCHITECTURE.md 顶层增量清单）+ contracts.intent 种子（`[Awaiting ADR]` 状态）+ ADR 骨架（Status 为 Proposed）。支持 legacy-fact-baseline（fact-extractor/api-contracts）和 greenfield-architecture-brief（PRD/Product Brief + 待验证假设）。是产品侧 `prd-writer` 的技术侧对称体。质量评分 ≥ 90 才放行。
version: "0.1.0"

# rfc-writer 是「技术契约位」的第二个 skill（Phase 3 内置）。在 arch-debate 把架构
# 方案空间收敛之后，把 rfc-draft 升级为正式 RFC + 可被 adr-writer 固化的 ADR 骨架
# + 待解锁的 contracts.intent 种子。它**不固化决策**（那是 adr-writer），只产骨架。
inputs:
  - from_skill: arch-debate
    artifact_type: rfc-draft
    required: true
    relevance: high

  - from_skill: arch-debate
    artifact_type: tech-decision-matrix
    required: false
    relevance: medium

  - from_skill: prd-writer
    artifact_type: prd-overview
    required: false
    relevance: medium
    # § Intent Mapping 标 contracts.intent 的行——本 RFC 要落地的契约清单。

  - from_skill: fact-extractor
    artifact_type: api-contracts
    required: false
    relevance: medium

artifacts:
  - type: rfc
    template: templates/rfc.md
    file_pattern: "{slug}.rfc.md"
    description: "正式 RFC 技术设计文档 + ARCHITECTURE.md 顶层增量清单（File Manifest）。落地时按 Manifest 合并到 products/{p}/ARCHITECTURE.md。"

  - type: contracts-intent-seed
    template: templates/contracts-intent-seed.intent
    file_pattern: "{slug}.contracts.intent"
    description: "contracts.intent 种子，goal 块 + `[Awaiting ADR-XXXX]` 注释。adr-writer 把对应 ADR 固化为 Accepted 后解锁，再交 intent-spec-writer 收紧合并。"

  - type: adr-skeleton
    template: templates/adr-skeleton.md
    file_pattern: "ADR-{id}-{slug}.md"
    description: "Architecture Decision Record 骨架，Status: Proposed。交 adr-writer 固化为 Accepted。"

workflow:
  initial: ingesting
  states:
    ingesting:
      description: "读 rfc-draft（必需）+ decision-matrix + prd § Intent Mapping + api-contracts 或 PRD/Product Brief。校验 rfc-draft 是否含 § Intent & Decision Mapping。"
      transitions:
        - to: drafting
          action: ingested
          guard: "checklist_complete:Ingest Checklist"

    drafting:
      description: "起草三件套（RFC + contracts 种子 + ADR 骨架）。它们同生共死，任何修改要同步。"
      transitions:
        - to: scoring
          action: ready-to-score

    scoring:
      description: "对 RFC 主稿做质量评分（4 维度共 100 分，目标 ≥ 90）。低于阈值退回 drafting。"
      transitions:
        - to: drafting
          action: refine
        - to: review
          action: pass
          guard: "has_sections:Context,Goals,Proposed Design,Intent & Decision Mapping,File Manifest;checklist_complete:Quality Checklist"

    review:
      description: "三件套一起呈给用户审阅。"
      transitions:
        - to: completed
          action: approve
          guard: "checklist_complete:Review Checklist"
          requires_approval: true
        - to: drafting
          action: revise

    completed:
      final: true

prompts:
  ingesting: |
    本状态把输入读完、补齐缺失，之后才能起草。

    ## 输入检查
    1. **rfc-draft**（必需，来自 arch-debate）：校验它含 § Intent & Decision Mapping
       （核心技术声明 → intent 层 + ADR/CADR 候选）。缺失则它不是 arch-debate 的
       合格产出——退回重跑 arch-debate，或在本 skill 访谈补齐。
    2. **tech-decision-matrix**：被否方案的量化依据，进 RFC § Alternatives。
    3. **prd-overview § Intent Mapping**：锁定本 RFC 要落地哪些 contracts 行。
    4. **事实基 / 简报基**：
       - legacy 模式：api-contracts / fact-extraction-report 用于判断是否破坏既有契约
       - greenfield 模式：PRD/Product Brief 是依据；PSP、tax service、storage、SLA、
         capacity 等超出 brief 的内容必须标 `[待验证]`

    ## Ingest Checklist
    - [ ] rfc-draft 已读，且通过 § Intent & Decision Mapping 校验（或访谈补齐）
    - [ ] decision-matrix 已读（或记录「单方案无矩阵」）
    - [ ] target_product 已锁定
    - [ ] 输入模式已记录（legacy-fact-baseline / greenfield-architecture-brief）
    - [ ] 事实基状态已记录（legacy→api-contracts/fact report；greenfield→PRD/Product Brief）
    - [ ] ADR ID 已分配（看 decisions/adr/ 现有最大号 +1）
    - [ ] CADR 候选已识别（如有，标记需先走 charter 修订）

  drafting: |
    起草三件套，**同生共死**。

    ## 三件套边界
    | Artifact | 内容 | 不准写 |
    |---|---|---|
    | **RFC** | 技术设计全文 + ARCHITECTURE.md 增量清单 + Intent & Decision Mapping | 决策固化（那是 ADR）|
    | **contracts 种子** | 可形式化的模块间契约（goal 块）| 性能/时延（D2）；ADR 未定的细节 |
    | **ADR 骨架** | 一个核心技术决策 + Consequences（精确到文件）| 「将会」叙事；现状描述 |

    ## RFC 起草纪律
    1. **Context** legacy 模式 cite fact-extraction-report / api-contracts；greenfield 模式
       cite PRD/Product Brief，超出 brief 的技术判断标 `[待验证]`。
    2. **Quality Attributes（NFR）**：性能/容量/可用性目标写这里 + 测试守护，
       **不进 contracts 种子**（D2）。
    3. **Proposed Design**：模块边界 + 数据流 + 关键接口签名。
    4. **Intent & Decision Mapping**：从 rfc-draft 继承并精化——每个 contracts 声明
       对应一个 goal 块（在种子里）+ 一个 ADR 候选。
    5. **File Manifest**：列出本 RFC 涉及的 ARCHITECTURE.md 段落 + contracts 种子 +
       ADR 文件，与 ADR Consequences 镜像一致。

    ## contracts 种子起草纪律
    - 用 `goal` 块声明每个模块间契约的**意图**（intent-lang 的 goal，0 VC）。
    - 种子阶段 `realized_by: []` 占位；**intent-spec-writer 合并 acceptance/invariants 后必填**。
    - 顶部注释登记 `[Awaiting ADR-XXXX]`——在对应 ADR Accepted 前，**不收紧成可验证
      的 intent/safety**（那一步由 adr-writer 解锁、intent-spec-writer 执行）。
    - 技术细节（协议、版本、字段）放注释，保持 goal 块本身简洁、可 `intent check`。
    - **不写**性能/时延/重试间隔（D2 → RFC 质量属性）。

    ## ADR 骨架起草纪律（对称 PDR）
    - 一份 ADR = 一个核心技术决策。Status: Proposed。
    - Decision Context 引用 arch-debate-record；Decision 现在时、不解释理由。
    - Consequences 精确到文件（ARCHITECTURE.md 段落 / contracts.intent block / 代码模块）。
    - Intent Impact 表声明本 ADR 影响哪些 contracts/invariants block。

  scoring: |
    给 RFC 主稿打质量分，目标 **≥ 90**。

    | 维度 | 权重 | 看什么 |
    |---|---|---|
    | 完整性 | 25 | Context/Goals/Non-Goals/Design/Alternatives/Risks/Migration 齐全 |
    | 清晰度 | 20 | 模块边界与数据流无歧义；无「适当/合理」类模糊词 |
    | 可验证性 | 25 | 契约声明能落成 contracts goal 块；NFR 有可测目标；性能未误塞 intent |
    | IDD 适配度 | 30 | Intent & Decision Mapping 完整、ADR-Ref 齐、charter 合规、File Manifest 与 ADR 镜像一致 |

    输出评分表 + 按 ROI 排序的改进建议 + 预期修订分。
    - 总分 ≥ 90 → pass 进 review；< 90 → refine 退回 drafting。
    - 用户可强制 pass，但 RFC 首部加水印 `Status: Draft (quality bypass: <reason>)`。

    ## Quality Checklist
    - [ ] 四维度已评分，总分已算
    - [ ] contracts 种子能 `intent check`（goal 块合法、0 VC）
    - [ ] 无性能/时延误塞进 contracts（D2）
    - [ ] File Manifest 与 ADR Consequences 镜像一致

  review: |
    三件套一起呈给用户：RFC（含 ARCHITECTURE 增量）→ ADR 骨架（Proposed）→
    contracts 种子（Awaiting ADR）。说明下一步：adr-writer 固化 ADR → 解锁 contracts
    种子 → intent-spec-writer 收紧合并。

    ## Review Checklist
    - [ ] RFC § File Manifest 与 ADR Consequences 完全一致
    - [ ] 每个 contracts goal 块对应 Intent & Decision Mapping 一行
    - [ ] ADR 骨架 Status: Proposed，ID 不与现有冲突
    - [ ] CADR 候选（如有）已标明需先走 charter 修订
    - [ ] RFC 质量评分 ≥ 90（或 bypass 理由已记录）
    - [ ] **已向用户展示三件套完整产出**

hooks:
  post_complete:
    - description: "落盘指引"
      message: |
        ✅ RFC 三件套已交付。建议下一步：
        1. **ADR 固化**：把 `ADR-{id}-{slug}.md` 交给 **adr-writer**，审批后 Status
           改 Accepted、移到 `products/{p}/decisions/adr/`——此后永不修改（charter 铁律）。
        2. **解锁 contracts 种子**：ADR Accepted 后，adr-writer 把 `{slug}.contracts.intent`
           的 `[Awaiting ADR-XXXX]` 解锁，交 **intent-spec-writer** 收紧成可验证 intent。
        3. **ARCHITECTURE.md 合并**：按 RFC § File Manifest 把增量合并进
           `products/{p}/ARCHITECTURE.md`，PR 必须 cite `ADR-{id}`。
        4. **跑 intent-consistency-check**：contracts 收紧合并后过 Z3 闸。
