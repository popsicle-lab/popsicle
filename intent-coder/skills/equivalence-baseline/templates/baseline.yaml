slice: "{slice-name}"
date: "{date}"
# feedback #21：从真实 pin 注入，别用假 commit。取值：
#   git -C legacy/<name> rev-parse HEAD    或    git submodule status legacy/<name>
# cutover gate 会校验 legacy_pin != 下面这个占位符（REPLACE_WITH_REAL_LEGACY_PIN），
# 未替换即拦切流——见 migration-slice-delivery / migration-preserve 的 gate。
legacy_pin: "REPLACE_WITH_REAL_LEGACY_PIN"
baseline_dir: "docs/baseline/{date}/{slice-name}/"
summary:
  golden_total: 0
  golden_pass: 0
  golden_fail: 0
  divergence_count: 0
  equivalence_gate_pass: false
goldens:
  - id: G-001
    description: "fixed observable behavior"
    script: "golden-001.sh"
    legacy: "legacy/popsicle/..."
    new: "crates/{slice-name}/..."
    compares: "stdout|json|file|guard-result|semantic"
    status: pending
    diff_summary: ""
    traces_to:
      - "acceptance.intent#IntentName"
divergences:
  - id: D-001
    behavior: ""
    legacy: ""
    new: ""
    reason: ""
    adr: "ADR-XXX"
