# Release: CLI tarballs/zip for 4 targets + macOS DMG (App + CLI).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-cli"
          save-if: true

      - name: Build release binary
        run: cargo build --release --bin popsicle --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf popsicle-${{ matrix.target }}.tar.gz popsicle
          mv popsicle-${{ matrix.target }}.tar.gz "$GITHUB_WORKSPACE/"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/popsicle.exe `
            -DestinationPath popsicle-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsicle-${{ matrix.target }}
          path: popsicle-${{ matrix.target }}.*

  build-dmg:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-dmg-${{ matrix.arch }}"
          save-if: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import Apple signing certificate
        run: bash packaging/macos/import-signing-cert.sh

      - name: Write notarization API key
        if: env.APPLE_API_KEY_CONTENT != ''
        run: |
          mkdir -p "$HOME/.private_keys"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$HOME/.private_keys/AuthKey.p8"
          chmod 600 "$HOME/.private_keys/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$HOME/.private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build DMG
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}
          POPSICLE_DMG_ARCH: ${{ matrix.arch }}
          POPSICLE_DMG_OUT_DIR: ${{ github.workspace }}/dist
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: bash packaging/macos/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsicle-dmg-${{ matrix.arch }}
          path: dist/Popsicle_*.dmg

  release:
    name: Create GitHub Release
    needs: [build, build-dmg]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: List release assets
        run: ls -lah dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/popsicle-*
            dist/Popsicle_*.dmg
          generate_release_notes: true
