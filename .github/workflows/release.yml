# Release (migrated from legacy/popsicle release.yml, ADR-014).
# Differences from legacy: no UI bundle / node toolchain / Linux webkit deps;
# the binary is crates/cli-ux (bin name `popsicle`). rusqlite is bundled, so
# only a C compiler is needed (preinstalled on all runners).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin popsicle --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf popsicle-${{ matrix.target }}.tar.gz popsicle
          mv popsicle-${{ matrix.target }}.tar.gz "$GITHUB_WORKSPACE/"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/popsicle.exe `
            -DestinationPath popsicle-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsicle-${{ matrix.target }}
          path: popsicle-${{ matrix.target }}.*

  build-dmg:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked --version "^2.0.0"

      - name: Build DMG
        run: |
          export CARGO_BUILD_TARGET=${{ matrix.rust_target }}
          bash packaging/macos/generate-icons.sh
          cd ui && npm ci && npm run build
          cargo build --release --features ui -p cli-ux --target ${{ matrix.rust_target }}
          cd crates/cli-ux && cargo tauri build --features ui --bundles app --target ${{ matrix.rust_target }}
          APP="target/${{ matrix.rust_target }}/release/bundle/macos/Popsicle.app"
          CLI="target/${{ matrix.rust_target }}/release/popsicle"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/Popsicle.app"
          cp "$CLI" "$STAGING/popsicle"
          chmod +x "$STAGING/popsicle"
          cp "packaging/macos/Install CLI.command" "$STAGING/"
          chmod +x "$STAGING/Install CLI.command"
          ln -s /Applications "$STAGING/Applications"
          VERSION="$(awk -F'"' '/"version"/ {print $4; exit}' crates/cli-ux/Cargo.toml)"
          OUT="Popsicle_${VERSION}_${{ matrix.arch }}.dmg"
          mkdir -p dist
          hdiutil create -volname "Popsicle" -srcfolder "$STAGING" -ov -format UDZO "dist/$OUT"
          rm -rf "$STAGING"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsicle-dmg-${{ matrix.arch }}
          path: dist/*.dmg

  release:
    name: Create GitHub Release
    needs: [build, build-dmg]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: popsicle-*
          generate_release_notes: true
