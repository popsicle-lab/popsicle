name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        shell: python
        run: |
          import struct
          png_path = r'crates/popsicle-cli/icons/icon.png'
          ico_path = r'crates/popsicle-cli/icons/icon.ico'
          with open(png_path, 'rb') as f:
              png_data = f.read()
          width = struct.unpack('>I', png_data[16:20])[0]
          height = struct.unpack('>I', png_data[20:24])[0]
          header = struct.pack('<HHH', 0, 1, 1)
          w = width if width < 256 else 0
          h = height if height < 256 else 0
          entry = struct.pack('<BBBBHHII', w, h, 0, 0, 1, 32, len(png_data), 22)
          with open(ico_path, 'wb') as f:
              f.write(header + entry + png_data)

      - name: Build binary
        run: cargo build -p popsicle-cli --features ui --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../popsicle-${{ github.ref_name }}-${{ matrix.target }}.tar.gz popsicle
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/popsicle.exe" -DestinationPath "popsicle-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: popsicle-${{ matrix.target }}
          path: popsicle-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            popsicle-*.tar.gz
            popsicle-*.zip
