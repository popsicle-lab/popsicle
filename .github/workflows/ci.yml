# CI (migrated from legacy/popsicle ci.yml, ADR-014).
# Differences from legacy: the `check` job is pure Rust; the optional `ui` job
# installs Node + Linux webkit/gtk deps for `make build-ui`. The cargo test suite includes the golden
# tests (golden_001-011), TSV/SQLite backend tests, and the isolated e2e
# workflow smoke. The intent-validate / shell golden chain needs intent-lang
# and runs locally via `make golden` / `make intent` (see Makefile).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-check"
          save-if: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --no-default-features

      - name: Run tests
        run: cargo test --all-targets --no-default-features

  ui:
    name: UI (optional)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-ui"
          save-if: true

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI + Tauri feature
        run: make build-ui

      - name: Test intent visualizer (ui default features)
        run: cargo test -p cli-ux --test intent_visualizer
