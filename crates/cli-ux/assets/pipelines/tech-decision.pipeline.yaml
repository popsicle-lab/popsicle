name: tech-decision
description: >-
  轻量技术决策编排：arch-debate → rfc → adr。用于就一个跨切片 / 架构层面的技术问题
  产出单个 Accepted 的 ADR（如 workspace / crate 布局、契约形态），不含产品侧 task 图、
  PRD、intent 收紧与活文档保活——那些归 migration-bootstrap 的产品主链。技术议题来自
  issue 描述或 ARCHITECTURE.md › Open Decisions 的 [TBD] ADR 候选。
scale: light
keywords:
  - tech
  - technical
  - architecture
  - decision
  - adr
  - workspace
  - layout
  - crate
  - contract
  - refactor

stages:
  - name: arch-debate
    skill: arch-debate
    description: >-
      多角色架构辩论（ARCH/SEC/PERF/OPS/DATA/DEV）。议题取自 issue 描述（或
      ARCHITECTURE.md › Open Decisions 的 [ADR 候选]）+ 现有事实基 / 既有 ADR /
      migration legacy 映射，产出 RFC 草稿 + 技术决策矩阵 + 辩论纪要。
    requires_approval: true

  - name: rfc
    skill: rfc-writer
    description: >-
      把 RFC 草稿打磨成正式 RFC + ARCHITECTURE.md 增量 + （如涉及跨模块契约）
      contracts.intent 种子（Awaiting ADR）+ ADR 骨架（Proposed）。质量评分 ≥ 90 才放行。
    depends_on: [arch-debate]
    requires_approval: true

  - name: adr
    skill: adr-writer
    description: >-
      把 ADR 骨架固化为 Accepted（此后不可变），解锁 contracts 种子的 Awaiting 状态
      （如有），列出收紧工单。是技术决策的审批闸；本 pipeline 的终点。
    depends_on: [rfc]
    requires_approval: true
